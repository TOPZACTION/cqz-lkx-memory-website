        /* ========== 轮播图完美自适应（高度固定，宽度按比例，绝不拉伸）========== */

        /* 轮播图图片样式 —— 使用自定义类，避开 Bootstrap 干扰 */
        .photo-container .carousel-item .carousel-img {
            height: 100%;              /* 高度填满容器 */
            width: auto;              /* 宽度自动缩放，保持比例 */
            max-width: none;          /* 允许宽度超过容器（用于裁剪） */
            margin: 0 auto;          /* 水平居中（针对宽度小于容器的竖图） */
            display: block;          /* 块级元素配合 margin auto 居中 */
        }

        /* 如果你希望「完整显示整张图，不裁剪」，请改用下面这组样式（取消注释即可）
        .photo-container .carousel-item .carousel-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }
        */

        /* 放大镜按钮位置与样式 */
        .photo-container .carousel-overlay {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
        }

        .photo-container .carousel-overlay .zoom-btn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .photo-container .carousel-overlay .zoom-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.1);
        }




                /* ========== 轮播图箭头优化：更明显 ========== */
        .carousel-control-prev,
        .carousel-control-next {
            width: 44px;              /* 按钮宽度 */
            height: 44px;            /* 按钮高度 */
            background: rgba(255, 255, 255, 0.9); /* 半透明白色背景 */
            border-radius: 50%;      /* 圆形按钮 */
            top: 50%;                /* 垂直居中 */
            transform: translateY(-50%);
            margin: 0 15px;          /* 左右间距 */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); /* 轻微阴影，更立体 */
            opacity: 1;              /* 完全不透明 */
            transition: all 0.2s ease;
        }

        .carousel-control-prev:hover,
        .carousel-control-next:hover {
            background: white;       /* 悬停时纯白背景 */
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
            transform: translateY(-50%) scale(1.05); /* 悬停稍微放大 */
        }

        /* 箭头图标改成深灰色，更显眼 */
        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            filter: invert(0.6) brightness(0.4);  /* 将白色箭头转为深灰 */
            width: 22px;
            height: 22px;
        }



        .photo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .photo-container {

        /* ==================== 情书卡片样式 ==================== */

    <!-- 照片放大功能（保留，供其他页面使用） -->
    <script>
        function zoomPhoto(button) {
            const photoCard = button.closest('.photo-card');
            let img, title, description;

            if (photoCard.querySelector('.carousel-item')) {
                const activeItem = photoCard.querySelector('.carousel-item.active');
                img = activeItem.querySelector('img');
                title = photoCard.querySelector('h5').innerText;
                description = photoCard.querySelector('p:last-child').innerText;
            } else {
                img = photoCard.querySelector('.photo-img');
                title = photoCard.querySelector('h5').innerText;
                description = photoCard.querySelector('p:last-child').innerText;
            }

            const imgSrc = img.src;
            const imgAlt = img.alt;

            const modal = document.createElement('div');
            modal.className = 'photo-modal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                opacity: 0;
                transition: opacity 0.3s ease;
            `;

            modal.innerHTML = `
                <div class="modal-content" style="max-width: 90%; max-height: 90%; display: flex; flex-direction: column; align-items: center; background: transparent; border: none;">
                    <button class="modal-close" onclick="closeModal()" style="position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; font-size: 30px; cursor: pointer; z-index: 10000;">×</button>
                    <div style="flex: 1; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 10px 10px 0 0; width: 100%;">
                        <img src="${imgSrc}" alt="${imgAlt}" style="max-width: 100%; max-height: 70vh; width: auto; height: auto; object-fit: contain; border-radius: 10px 10px 0 0;">
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 0 0 10px 10px; width: 100%;">
                        <h4 style="color: #333; margin-bottom: 10px;">${title}</h4>
                        <p style="color: #666; margin-bottom: 0;">${description}</p>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            setTimeout(() => { modal.style.opacity = '1'; }, 10);

            document.addEventListener('keydown', function photoModalKeydown(e) {
                if (e.key === 'Escape') {
                    closeModal();
                    document.removeEventListener('keydown', photoModalKeydown);
                }
            });

            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            });
        }

        function closeModal() {
            const modal = document.querySelector('.photo-modal');
            if (modal) {
                modal.style.opacity = '0';
                setTimeout(() => {
                    modal.remove();
                }, 300);
            }
        }
    </script>

    <!-- 情书模块的 JavaScript -->
    <script>
        // 情书数据
        const letters = [
            {
                title: "第一封：初见",
                date: "2023.10.15 · 晴",
                preview: "还记得第一次见你的那个下午，阳光透过咖啡馆的落地窗，在你侧脸上勾勒出温柔的轮廓...",
                content: `
                    <p>还记得第一次见你的那个下午，阳光透过咖啡馆的落地窗，在你侧脸上勾勒出温柔的轮廓。你低头翻着菜单，偶尔抬头对我浅浅一笑，那一刻我就知道，这个午后会和以往所有日子都不一样。</p>
                    <p>后来我们聊了很多，从喜欢的书到童年的趣事，从对未来的幻想到藏在心底的小秘密。时间像被偷走了一样，不知不觉窗外已经亮起了路灯。送你到地铁站时，你转身挥手的背影，成了我那天最舍不得的画面。</p>
                    <p>现在每次路过那家咖啡馆，我都会想起你坐在对面的样子。亲爱的，遇见你是我此生最美的意外。</p>
                `
            },
            {
                title: "第二封：与你同行",
                date: "2023.11.20 · 海边",
                preview: "那天傍晚我们一起去海边散步，你赤着脚走在沙滩上，海浪一次次轻轻没过你的脚踝...",
                content: `
                    <p>那天傍晚我们一起去海边散步，你赤着脚走在沙滩上，海浪一次次轻轻没过你的脚踝。你笑着回头看我，夕阳在你身后铺开一片橘色。我突然觉得，只要能这样一直看着你的笑容，生活就足够美好。</p>
                    <p>我们捡了好多贝壳，你挑了几个最漂亮的装进口袋，说要带回家放在书桌上。我悄悄多捡了一个最完整的，后来悄悄放在你的包里——不知道你发现了吗？</p>
                    <p>和你在一起的每一天，平凡都变得闪闪发光。未来的路还很长，但我已经迫不及待想和你一起去更多地方，看更多风景。</p>
                `
            },
            {
                title: "第三封：晚安，我的爱",
                date: "2023.12.05 · 深夜",
                preview: "夜深了，窗外的灯火一盏盏熄灭。我躺在床上，想象着你此刻也许已经进入梦乡...",
                content: `
                    <p>夜深了，窗外的灯火一盏盏熄灭。我躺在床上，想象着你此刻也许已经进入梦乡。不知道你的梦里有没有我？如果有，希望你梦到的是我们一起笑、一起闹的场景。</p>
                    <p>白天你发来的照片还保存在手机里，我翻来覆去看了好几遍。你嘟着嘴假装生气的样子，真让人想捏捏你的脸。真想现在就告诉你，你是我每天睁开眼睛第一个想到的人，也是我闭上眼睛前最后想念的人。</p>
                    <p>晚安，我的宝贝。愿你今夜好眠，明天又是甜蜜的一天。</p>
                `
            }
        ];

        // 当前显示的情书索引
        let currentLetterIndex = 0;

        // 渲染卡片列表
        function renderCards() {
            const container = document.getElementById('letter-list');
            container.innerHTML = '';
            letters.forEach((letter, index) => {
                const col = document.createElement('div');
                col.className = 'col-lg-6';  // 每行两列，可改为 col-12 让每行一个
                col.innerHTML = `
                    <div class="letter-card" onclick="openLetter(${index})">
                        <h2><i class="fas fa-heart"></i> ${letter.title}</h2>
                        <div class="letter-meta"><i class="far fa-calendar-alt me-1"></i> ${letter.date}</div>
                        <p class="preview">${letter.preview}</p>
                    </div>
                `;
                container.appendChild(col);
            });
        }

        // 打开模态框并显示指定索引的情书
        window.openLetter = function(index) {
            currentLetterIndex = index;
            updateModalContent();
            const modal = new bootstrap.Modal(document.getElementById('letterModal'));
            modal.show();
        };

        // 更新模态框内容
        function updateModalContent() {
            const letter = letters[currentLetterIndex];
            document.getElementById('modalTitle').innerText = letter.title;
            document.getElementById('modalDate').innerHTML = `<i class="far fa-calendar-alt me-1"></i> ${letter.date}`;
            document.getElementById('modalContent').innerHTML = letter.content;
            document.getElementById('letterCounter').innerText = `${currentLetterIndex + 1} / ${letters.length}`;
        }

        // 上一封
        function prevLetter() {
            if (currentLetterIndex > 0) {
                currentLetterIndex--;
                updateModalContent();
            } else {
                alert('已经是第一封了');
            }
        }

        // 下一封
        function nextLetter() {
            if (currentLetterIndex < letters.length - 1) {
                currentLetterIndex++;
                updateModalContent();
            } else {
                alert('已经是最后一封了');
            }
        }

        // 绑定按钮事件（确保 DOM 加载完成后执行）
        document.addEventListener('DOMContentLoaded', function() {
            renderCards();
            document.getElementById('prevLetterBtn').addEventListener('click', prevLetter);
            document.getElementById('nextLetterBtn').addEventListener('click', nextLetter);
        });
    </script>
